# render.yaml — Render.com deployment configuration
#
# This file declares both services in one place.
# Deploy at: https://dashboard.render.com/select-repo
#
# BEFORE DEPLOYING:
#   1. Set JWT_SECRET to the output of: openssl rand -hex 32
#   2. Set CORS_ORIGIN to your frontend's Render URL (e.g. https://concord-text.onrender.com)
#      OR your custom domain.
#   3. The DATABASE_URL is injected automatically by the Render PostgreSQL instance below.

services:
  # ──────────────────────────────────────────────
  # Backend: Fastify + Socket.io sync server
  # ──────────────────────────────────────────────
  - type: web
    name: concord-sync-server
    runtime: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter concord-core run build && pnpm --filter concord-sync-server run build
    startCommand: pnpm --filter concord-sync-server run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: JWT_SECRET
        generateValue: true          # Render auto-generates a secure random value
      - key: CORS_ORIGIN
        value: https://concord-text.onrender.com  # Update to your frontend URL
      - key: DATABASE_URL
        fromDatabase:
          name: concord-db
          property: connectionString

  # ──────────────────────────────────────────────
  # Frontend: React + Vite static site
  # ──────────────────────────────────────────────
  - type: web
    name: concord-text
    runtime: static
    region: oregon
    plan: free
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter concord-core run build && pnpm --filter concord-text run build
    staticPublishPath: ./apps/text-editor/dist
    envVars:
      - key: VITE_API_URL
        value: https://concord-sync-server.onrender.com  # Update to your backend URL
    routes:
      # SPA fallback — serve index.html for all unmatched paths
      - type: rewrite
        source: /*
        destination: /index.html

# ──────────────────────────────────────────────
# PostgreSQL database
# ──────────────────────────────────────────────
databases:
  - name: concord-db
    region: oregon
    plan: free
    databaseName: concord
    user: concord
